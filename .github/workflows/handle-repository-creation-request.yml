name: Handle Repository Creation Request

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: >
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'repo-creation-request') &&
      startsWith(github.event.issue.title, '[REPO-CREATION-REQUEST]')
    runs-on: ubuntu-latest

    outputs:
      validate_status:  ${{ steps.validate.outputs.status }}
      validate_success: ${{ steps.validate.outputs.success }}
      validate_error:   ${{ steps.validate.outputs.error }}
      validate_warning: ${{ steps.validate.outputs.warning }}
      validate_info:    ${{ steps.validate.outputs.info }}

      duplicate_status: ${{ steps.duplicate.outputs.status }}
      duplicate_error:  ${{ steps.duplicate.outputs.error }}

      create_status:   ${{ steps.create.outputs.status }}
      create_success:  ${{ steps.create.outputs.success }}
      create_error:    ${{ steps.create.outputs.error }}

      topics_status:   ${{ steps.topics.outputs.status }}
      topics_success:  ${{ steps.topics.outputs.success }}
      topics_error:    ${{ steps.topics.outputs.error }}

      metadata_status:  ${{ steps.metadata.outputs.status }}
      metadata_success: ${{ steps.metadata.outputs.success }}
      metadata_error:   ${{ steps.metadata.outputs.error }}

      orgvars_status:  ${{ steps.orgvars.outputs.status }}
      orgvars_success: ${{ steps.orgvars.outputs.success }}
      orgvars_error:   ${{ steps.orgvars.outputs.error }}
      orgvars_info:    ${{ steps.orgvars.outputs.info }}

    steps:

      - uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id:      ${{ secrets.GH_APP_ID || vars.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}

      # =========================
      # VALIDATE
      # =========================
      - name: Validate Input
        id: validate
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body;

            function extract(label) {
              const regex  = new RegExp(`### ${label}\\s+([\\s\\S]*?)(?=\\n###|$)`);
              const match  = body.match(regex);
              return match ? match[1].trim() : null;
            }

            let errors = [];
            let warnings = [];

            const product        = extract("Product Line");
            const aspect         = extract("Aspect / Domain");
            const name           = extract("Repository Name");
            const projectType    = extract("Project Type");
            const descriptionRaw = extract("Repository Description \\(Max\\. 350 characters\\)");
            const visibilityRaw  = extract("Repository Visibility");
            const repoOptions    = extract("Repository Options \\(Optional\\)");
            let tenant           = extract("Tenant Name \\(Optional\\)");

            if (projectType && projectType.startsWith("---")) {
              errors.push("Invalid Project Type selected. Please choose a valid option.");
            }

            if (!tenant || tenant === "_No response_" || tenant === "None") {
              tenant = null;
            }

            if (!product) errors.push("Missing: Product Line");
            if (!aspect) errors.push("Missing: Aspect / Domain");
            if (!name) errors.push("Missing: Repository Name");
            if (!projectType) errors.push("Missing: Project Type");
            if (!descriptionRaw) errors.push("Missing: Repository Description");

            if (name && !/^[a-z0-9-]+$/.test(name)) {
              errors.push("Repository name must be kebab-case (lowercase, numbers, hyphens only).");
            }

            let visibility;
            if (visibilityRaw?.includes("Private")) visibility = "private";
            else if (visibilityRaw?.includes("Public")) visibility = "public";
            else if (visibilityRaw?.includes("Internal")) visibility = "internal";
            else errors.push("Invalid visibility option selected.");

            let autoInit = false;
            if (repoOptions) {
              if (repoOptions.includes("- [x] Initialize repository with README")) {
                autoInit = true;
              } else if (repoOptions !== "_No response_") {
                errors.push("Invalid repository options selection.");
              }
            }

            let finalName = null;

            if (product && aspect && name) {
              finalName = tenant
                ? `${product}-${aspect}-${name}-${tenant}`
                : `${product}-${aspect}-${name}`;

              if (finalName.length > 100) {
                errors.push(
            `❌ Repository name exceeds allowed length.

            Allowed max length: 100 characters  
            Computed final repository name:
            ${finalName}

            Computed length: ${finalName.length}

            👉 Naming format:
            <product>-<aspect>-<name>[-<tenant>]`
                );
              }
            }

            function sanitize(v) {
              return v.toLowerCase().replace(/[^a-z0-9-]/g, "-");
            }

            let topics = [];

            if (product && aspect && name && projectType) {
              topics = [
                "managed-by-platform",
                `product-${sanitize(product)}`,
                `aspect-${sanitize(aspect)}`,
                `repo-${sanitize(name)}`,
                `type-${sanitize(projectType)}`
              ];

              if (tenant) topics.push(`tenant-${sanitize(tenant)}`);

              const longTopics = topics.filter(t => t.length > 50);

              if (longTopics.length > 0) {
                errors.push(
            `❌ Some repository topics exceed 50 characters:

            ${longTopics.join("\n")}

            👉 Please shorten input values.`
                );
              }
            }

            if (descriptionRaw && descriptionRaw.length > 350) {
              warnings.push("Description exceeds 350 characters and will be truncated.");
            }

            const metadata = {
              REPO_METADATA_PRODUCTLINE: product,
              REPO_METADATA_ASPECT: aspect,
              REPO_METADATA_NAME: name,
              REPO_METADATA_TYPE: projectType,
              REPO_METADATA_TENANT: tenant,
              REPO_METADATA_MANAGED: true
            };

            if (errors.length > 0) {
              core.setOutput("status", "PARSE_ERROR");
              core.setOutput("error", errors.join("\n\n"));
              core.setOutput("warning", JSON.stringify(warnings));
              core.setOutput("info", JSON.stringify([]));
              return;
            }

            core.setOutput("status", "OK");
            core.setOutput("success", "✅ Validation successful.");
            core.setOutput("warning", JSON.stringify(warnings));
            core.setOutput("info", JSON.stringify([]));

            core.setOutput("final_name", finalName);
            core.setOutput("visibility", visibility);
            core.setOutput("auto_init", autoInit);
            core.setOutput("topics", JSON.stringify(topics));
            core.setOutput("metadata", JSON.stringify(metadata));
            core.setOutput("description", descriptionRaw.substring(0, 350));

      # =========================
      # DUPLICATE CHECK
      # =========================
      - name: Check Duplicate
        id: duplicate
        if: steps.validate.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              await github.rest.repos.get({
                owner: context.repo.owner,
                repo: process.env.FINAL_NAME
              });

              core.setOutput("status", "DUPLICATE_ERROR");

            } catch (e) {
              if (e.status === 404) {
                core.setOutput("status", "OK");
              } else {
                const msg = `❌ Failed to verify if repository already exists.

            Repository: ${process.env.FINAL_NAME}

            Error: ${e.message}

            👉 Please edit this issue and retry or close this and create a new issue or contact platform team if issue persists.
            `;
                core.setOutput("status", "ERROR");
                core.setOutput("error", msg);
              }
            }

      # =========================
      # CREATE REPO
      # =========================
      - name: Create Repo
        id: create
        if: steps.duplicate.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME:  ${{ steps.validate.outputs.final_name }}
          DESCRIPTION: ${{ steps.validate.outputs.description }}
          VISIBILITY:  ${{ steps.validate.outputs.visibility }}
          AUTO_INIT:   ${{ steps.validate.outputs.auto_init }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              const repo = await github.rest.repos.createInOrg({
                org: context.repo.owner,
                name: process.env.FINAL_NAME,
                description: process.env.DESCRIPTION,
                visibility: process.env.VISIBILITY,
                auto_init: process.env.AUTO_INIT === "true"
              });

              core.setOutput("status", "OK");
              core.setOutput("success", `✅ Repository created successfully.\n${repo.data.html_url}`);

            } catch (e) {
              const msg = `❌ Failed to create repo.

            Repository: ${process.env.FINAL_NAME}

            Error: ${e.message}

            👉 Please edit this issue and retry or close this and create a new issue or contact platform team if issue persists.
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
            }

      # =========================
      # TOPICS
      # =========================
      - name: Add Topics
        id: topics
        continue-on-error: true
        if: steps.create.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
          TOPICS:     ${{ steps.validate.outputs.topics }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              await github.rest.repos.replaceAllTopics({
                owner: context.repo.owner,
                repo: process.env.FINAL_NAME,
                names: JSON.parse(process.env.TOPICS)
              });

              core.setOutput("status", "OK");
              core.setOutput("success", "Topics applied successfully.");

            } catch (e) {
              const msg = `⚠️ Failed to apply repository topics.

            Repository: ${process.env.FINAL_NAME}

            Topics:
            ${process.env.TOPICS}

            Error:
            ${e.message}
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
            }

      # =========================
      # METADATA VARIABLES
      # =========================
      - name: Add Metadata Variables
        id: metadata
        continue-on-error: true
        if: steps.create.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
          METADATA:   ${{ steps.validate.outputs.metadata }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const metadata = JSON.parse(process.env.METADATA);
            let failures = [];
            let successCount = 0;

            for (const [key, value] of Object.entries(metadata)) {
              if (value === null || value === undefined) continue;

              try {
                await github.rest.actions.createRepoVariable({
                  owner: context.repo.owner,
                  repo: process.env.FINAL_NAME,
                  name: key,
                  value: String(value)
                });
                successCount++;
              } catch (e) {
                failures.push(`Variable: ${key}\nError: ${e.message}`);
              }
            }

            if (failures.length === 0) {
              core.setOutput("status", "OK");
              core.setOutput("success", "Metadata variables applied successfully.");
            } else {
              const msg = `⚠️ Some repository metadata variables failed to be created.

            Repository: ${process.env.FINAL_NAME}

            Successful: ${successCount}
            Failed: ${failures.length}

            Failure details:
            ${failures.join("\n\n")}
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
            }

      # =========================
      # ORG VARIABLES
      # =========================
      - name: Copy Org Variables
        id: orgvars
        continue-on-error: true
        if: steps.create.outputs.status == 'OK' && steps.validate.outputs.visibility == 'private'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            let failures = [];
            let skipped = [];
            let successCount = 0;
            let total = 0;

            let allVars;

            try {
              allVars = await github.paginate(
                github.rest.actions.listOrgVariables,
                { org: context.repo.owner }
              );
            } catch (e) {
              const msg = `⚠️ Failed to fetch organization variables.

            Error: ${e.message}
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
              return;
            }

            if (!allVars || allVars.length === 0) {
              core.setOutput("status", "OK");
              core.setOutput("info", JSON.stringify(["No organization variables found."]));
              return;
            }

            for (const v of allVars) {
              total++;

              if (v.visibility === "selected") {
                skipped.push(v.name);
                continue;
              }

              try {
                await github.rest.actions.createRepoVariable({
                  owner: context.repo.owner,
                  repo: process.env.FINAL_NAME,
                  name: v.name,
                  value: v.value
                });
                successCount++;
              } catch (e) {
                failures.push(`Variable: ${v.name}\nError: ${e.message}`);
              }
            }

            let infoMsg = "";

            if (skipped.length > 0) {
              infoMsg = `ℹ️ Skipped organization variables with restricted visibility ("selected"):

            ${skipped.join("\n")}
            `;
            }

            core.setOutput("info", infoMsg);

            if (failures.length === 0) {
              core.setOutput("status", "OK");
              core.setOutput("success", "Organization variables copied successfully.");
            } else {
              const msg = `⚠️ Some organization variables failed to copy.

            Repository: ${process.env.FINAL_NAME}

            Total Variables: ${total}
            Successfully Copied: ${successCount}
            Skipped (restricted): ${skipped.length}
            Failed: ${failures.length}

            Failure details:
            ${failures.join("\n\n")}
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
            }

  finalize:
    needs: process
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Comment & Close
        uses: actions/github-script@v9
        env:
          DATA: ${{ toJson(needs.process.outputs) }}
        with:
          script: |
            const d = JSON.parse(process.env.DATA);

            let success = [];
            let warnings = [];
            let info = [];
            let errors = [];

            function safeParse(val) {
              try {
                return JSON.parse(val || "[]");
              } catch {
                return [];
              }
            }

            if (d.validate_status === "PARSE_ERROR") {
              errors.push(d.validate_error);
            } else {
              if (d.validate_success) success.push(d.validate_success);
              warnings.push(...safeParse(d.validate_warning));
            }

            if (d.duplicate_status === "DUPLICATE_ERROR") {
              errors.push("❌ Repository already exists.\n\nPlease edit and retry.");
            } else if (d.duplicate_status === "ERROR") {
              errors.push(d.duplicate_error);
            }

            if (d.create_status === "ERROR") {
              errors.push(d.create_error);
            } else if (d.create_status === "OK") {
              success.push(d.create_success);
            }

            if (d.topics_status === "ERROR") warnings.push(d.topics_error);
            if (d.metadata_status === "ERROR") warnings.push(d.metadata_error);
            if (d.orgvars_status === "ERROR") warnings.push(d.orgvars_error);

            if (d.orgvars_info) info.push(d.orgvars_info);

            let body = "";

            if (errors.length > 0) {
              body += `❌ Errors:\n\n${errors.join("\n\n")}`;
            }

            if (success.length > 0) {
              body += `\n\n✅ Success:\n\n${success.join("\n\n")}`;
            }

            if (warnings.length > 0) {
              body += `\n\n⚠️ Warnings:\n\n${warnings.join("\n\n")}`;
            }

            if (info.length > 0) {
              body += `\n\nℹ️ Info:\n\n${info.join("\n\n")}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (d.create_status === "OK" || d.duplicate_status === "DUPLICATE_ERROR") {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed"
              });
            }
